<!DOCTYPE html>
<html>
<head>
    <title>REALSUNIO DEVICE HUB</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e0e0e0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: #151921; padding: 30px; border-radius: 15px; border: 1px solid #2b2f36; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #f0b90b; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0b90b; padding-bottom: 10px; }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #848e9c; }
        input, select { width: 100%; padding: 12px; background: #1e2329; border: 1px solid #474d57; color: white; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #f0b90b; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-sync { background: #f0b90b; color: #000; }
        .btn-refresh { background: #2b3139; color: white; border: 1px solid #474d57; }
        #log-box { background: #000; height: 180px; overflow-y: auto; padding: 15px; margin-top: 25px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 13px; border: 1px solid #333; }
        .success { color: #00ff88; }
        .error { color: #ff4d4d; }
        .info { color: #33b5e5; }
        .status-dot { height: 10px; width: 10px; background-color: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>@REALSUNIO SMS MASTER v10.1</h2>
        
        <div class="field">
            <label>1. Telegram Channel ID</label>
            <input type="text" id="cid" placeholder="-100xxxxxxxxxx">
        </div>

        <div class="field">
            <label>2. Select Active Device (Auto-Detected)</label>
            <select id="deviceList">
                <option value="">Scanning for devices...</option>
            </select>
        </div>

        <div class="field">
            <label>3. Select SIM Slot</label>
            <select id="simSlot">
                <option value="1">SIM 1 (Primary)</option>
                <option value="2">SIM 2 (Secondary)</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn-refresh" onclick="scanDevices()">Refresh Devices</button>
            <button class="btn-sync" onclick="saveSettings()">Sync & Start Bot</button>
        </div>

        <div id="log-box">System Initialized. Log ready.</div>
    </div>

    <script>
        const DB_URL = "https://xooejtvks-default-rtdb.firebaseio.com";

        // 1. Scan Devices from Firebase
        function scanDevices() {
            const select = document.getElementById('deviceList');
            select.innerHTML = '<option>Scanning...</option>';
            
            fetch(`${DB_URL}/devices.json`)
            .then(res => res.json())
            .then(devices => {
                select.innerHTML = '';
                if (!devices) {
                    select.innerHTML = '<option value="">No devices found!</option>';
                    return;
                }
                
                for (let id in devices) {
                    let model = devices[id].model || "Unknown Model";
                    let option = document.createElement('option');
                    option.value = id;
                    option.innerHTML = `📱 ${model} (${id})`;
                    select.appendChild(option);
                }
            });
        }

        // 2. Save Settings to Firebase
        function saveSettings() {
            let config = {
                channelId: document.getElementById('cid').value,
                active_device: document.getElementById('deviceList').value,
                active_sim_slot: document.getElementById('simSlot').value,
                tgToken: "7978593529:AAFeC7_9nMxb9qVmWHGg4KJ63GPzjVQvIQo"
            };

            if(!config.active_device) { alert("Please select a device!"); return; }

            fetch(`${DB_URL}/app_config.json`, {
                method: 'PATCH',
                body: JSON.stringify(config)
            }).then(() => {
                alert("Engine Synced with Device: " + config.active_device);
                logToWeb("Sync Success: Listening on Channel " + config.channelId, "success");
            });
        }

        function logToWeb(msg, type) {
            fetch(`${DB_URL}/last_log.json`, {
                method: 'PUT',
                body: JSON.stringify({msg: `[UI] ${msg}`, type: type, ts: Date.now()})
            });
        }

        // 3. Live Log Monitor
        setInterval(() => {
            fetch(`${DB_URL}/last_log.json`)
            .then(res => res.json())
            .then(data => {
                if(data) {
                    let logBox = document.getElementById('log-box');
                    if (!logBox.innerHTML.includes(data.msg)) {
                        logBox.innerHTML = `<div class="${data.type}">${data.msg}</div>` + logBox.innerHTML;
                    }
                }
            });
        }, 2500);

        // Initial Scan
        scanDevices();
    </script>
</body>
</html>
