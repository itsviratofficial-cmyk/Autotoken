<!DOCTYPE html>
<html>
<head>
    <title>REALSUNIO SMS DASHBOARD</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; }
        .btn-sync { background: #007bff; color: white; }
        .btn-test { background: #28a745; color: white; margin-left: 10px; }
        #log-window { background: black; height: 150px; overflow-y: auto; padding: 10px; font-family: monospace; border: 1px solid #444; margin-top: 10px; }
        .log-success { color: #00ff00; }
        .log-error { color: #ff4444; }
        .log-info { color: #00ccff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>@REALSUNIO SMS ENGINE v9.9</h2>
        <input type="text" id="channelId" placeholder="Channel ID (e.g. -100...)" style="width:250px; padding:8px;">
        <button class="btn-sync" onclick="syncEngine()">Sync Engine</button>
        <button class="btn-test" onclick="testEngine()">Test Engine</button>
    </div>

    <div class="card">
        <h3>Live Activity Logs</h3>
        <div id="log-window">Connecting to logs...</div>
    </div>

    <script>
        const DB_URL = "https://xooejtvks-default-rtdb.firebaseio.com";

        // Testing Function
        function testEngine() {
            alert("Sending test signal... Check Pydroid/Telegram!");
            // Push a test command to Firebase
            fetch(`${DB_URL}/last_log.json`, {
                method: 'PUT',
                body: JSON.stringify({msg: "[UI] Test Button Clicked", type: "info", ts: Date.now()})
            });
        }

        function syncEngine() {
            let cid = document.getElementById('channelId').value;
            fetch(`${DB_URL}/app_config.json`, {
                method: 'PATCH',
                body: JSON.stringify({channelId: cid, tgToken: "7978593529:AAFeC7_9nMxb9qVmWHGg4KJ63GPzjVQvIQo"})
            }).then(() => alert("Engine Synced!"));
        }

        // Live Log Reader
        setInterval(() => {
            fetch(`${DB_URL}/last_log.json`)
            .then(res => res.json())
            .then(data => {
                if(data) {
                    let logWin = document.getElementById('log-window');
                    let logClass = "log-" + data.type;
                    logWin.innerHTML = `<div class="${logClass}">${data.msg}</div>` + logWin.innerHTML;
                }
            });
        }, 3000);
    </script>
</body>
</html>
